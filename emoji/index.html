<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Core - emoji</title>
    <meta name="description" content="Copy emoji for Discord server messages, channels, announcements and roles.">
    <meta name="theme-color" content="#0c0e12">
    <meta property="og:title" content="Core - emoji">
    <meta property="og:description" content="A fast emoji picker for Discord servers.">
    <meta property="og:image" content="../assets/hero-core.webp">
    <meta property="og:type" content="website">
    <link rel="icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../" aria-label="Core">
        <img src="../assets/core-mark.png" alt="" width="36" height="36">
        <span>Core</span>
      </a>

      <div class="header-navs">
        <div class="nav-group">
          <span data-i18n="nav.siteLabel">Страницы</span>
          <nav class="site-tabs" aria-label="Site pages">
            <a href="../" data-i18n="nav.home">Главная</a>
            <a href="../templates/" data-i18n="nav.templates">Шаблоны</a>
            <a href="../rules/" data-i18n="nav.rules">Правила</a>
            <a href="../symbols/" data-i18n="nav.symbols">Символы</a>
            <a class="is-active" href="./" data-i18n="nav.emoji">Emoji</a>
          </nav>
        </div>
      </div>

      <div class="header-actions">
        <div class="language-switcher" role="group" aria-label="Language">
          <button type="button" class="language-button is-active" data-lang="ru" aria-pressed="true">RU</button>
          <button type="button" class="language-button" data-lang="en" aria-pressed="false">EN</button>
          <button type="button" class="language-button" data-lang="ua" aria-pressed="false">UA</button>
          <button type="button" class="language-button" data-lang="de" aria-pressed="false">DE</button>
        </div>
        <a class="header-server" data-i18n="nav.server" data-official-server-url href="https://discord.gg/FjfZkHEuyv">Сервер</a>
        <a class="header-invite" data-i18n="nav.add" href="https://discord.com/oauth2/authorize?client_id=1499785495264104688&permissions=8&integration_type=0&scope=bot+applications.commands">Добавить</a>
      </div>
    </header>

    <main id="top" class="tool-page">
      <section class="section tool-hero">
        <div class="section-heading" data-reveal>
          <p class="eyebrow" data-tool-eyebrow>Copy tools</p>
          <h1 data-tool-title>Emoji для Discord</h1>
          <p data-tool-copy>Выбирай emoji для объявлений, ролей, каналов и сообщений. Нажми на любой emoji, чтобы скопировать его.</p>
        </div>
        <a class="button secondary" href="../symbols/" data-tool-switch>Символы</a>
      </section>

      <section class="section copy-tool-section">
        <div class="copy-tool-panel" data-copy-tool="emoji" data-reveal>
          <div class="copy-tool-toolbar">
            <label>
              <span data-tool-search-label>Поиск</span>
              <input type="search" data-tool-search autocomplete="off" placeholder="smile, game, flag">
            </label>
            <strong data-tool-count>0</strong>
          </div>

          <div class="copy-tool-tabs" data-tool-tabs></div>

          <div class="copy-tool-recent" data-tool-recent-wrap hidden>
            <div class="copy-tool-heading">
              <h2 data-tool-recent-title>Недавние</h2>
            </div>
            <div class="copy-token-grid" data-tool-recent></div>
          </div>

          <div class="copy-tool-results" data-tool-grid></div>
          <div class="copy-toast" data-copy-toast aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Core</span>
      <span data-i18n="footer.text">Built for cleaner Discord servers.</span>
      <a class="footer-link" data-i18n="footer.server" data-official-server-url href="https://discord.gg/FjfZkHEuyv">Official server</a>
    </footer>

    <script src="../assets/site-config.js"></script>
    <script src="../assets/emoji-data.js"></script>
    <script src="../assets/app.js"></script>
  </body>
</html>
